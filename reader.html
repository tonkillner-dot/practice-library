<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading - Practice Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Outfit:wght@300;500;700;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030712;
            --level-color: #6366f1;
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-color); 
            color: #f8fafc;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- Background --- */
        #glow-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -3;
            background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #030712 100%);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* --- Content Area --- */
        .content-font {
            font-family: 'Lora', 'Sarabun', serif;
            line-height: 1.8;
            font-size: 1.25rem;
        }

        .word-link {
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            display: inline-block;
            padding: 0 2px;
            border-radius: 4px;
        }
        .word-link:hover {
            background: var(--level-color);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--level-color);
        }

        /* --- Navigation --- */
        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        .nav-btn:hover:not(:disabled) {
            background: var(--level-color);
            border-color: white;
            transform: scale(1.05);
        }
        .nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }

        #modal { background: rgba(3, 7, 18, 0.9); backdrop-filter: blur(12px); z-index: 100; }

        .reveal {
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.6s ease-out forwards;
        }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        .progress-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }
        .progress-dot.active {
            background: var(--level-color);
            box-shadow: 0 0 10px var(--level-color);
            transform: scale(1.5);
        }

        /* --- Dynamic Layout Utilities --- */
        .layout-portrait { @apply md:flex-row; }
        .layout-landscape { @apply md:flex-col; }
    </style>
</head>
<body>
    <div id="glow-bg"></div>

    <div class="max-w-7xl mx-auto px-4 py-8 relative z-10 min-h-screen flex flex-col">
        <!-- Header -->
        <header class="flex items-center justify-between mb-10 reveal">
            <button onclick="window.location.href='library.html'" class="nav-btn px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                LIBRARY
            </button>
            <div id="progress-container" class="flex gap-3"></div>
            <div id="chapter-counter" class="text-[10px] font-black tracking-widest text-slate-500 uppercase">Chapter 1</div>
        </header>

        <!-- Main Layout Container (Dynamic) -->
        <main id="main-layout" class="flex-1 flex flex-col gap-8 mb-10 reveal" style="animation-delay: 0.2s">
            
            <!-- Side 1: Image / Visual Area -->
            <div id="image-container" class="w-full flex-1 transition-all duration-500">
                <div class="glass-panel rounded-[3rem] overflow-hidden relative shadow-2xl h-full min-h-[350px] bg-black/20 flex items-center justify-center">
                    <div id="visual-engine" class="w-full h-full absolute inset-0"></div>
                    <div class="absolute bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-black/90 via-black/30 to-transparent z-10">
                        <h2 id="ch-title" class="text-3xl md:text-5xl font-black text-white tracking-tight">Loading...</h2>
                    </div>
                </div>
            </div>

            <!-- Side 2: Text & Content Area -->
            <div id="text-container" class="w-full flex-[1.2] flex flex-col gap-6 transition-all duration-500">
                
                <!-- Vocabulary (Chapter 1 Only) -->
                <div id="vocab-section" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 hidden"></div>

                <!-- Reading Content -->
                <div class="glass-panel rounded-[3rem] p-8 md:p-12 shadow-xl relative overflow-hidden flex-1">
                    <div class="absolute top-0 left-0 w-2 h-full bg-gradient-to-b from-indigo-500 to-transparent opacity-50"></div>
                    <div id="content-area" class="content-font text-slate-200"></div>
                    
                    <!-- Audio Control -->
                    <div class="mt-12 flex justify-start">
                        <button onclick="speakFullContent()" class="group flex items-center gap-4 px-8 py-4 rounded-2xl bg-white/5 hover:bg-white/10 transition-all border border-white/5">
                            <div class="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform">
                                <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 5v14l-7-7H3V9h2l7-7zM18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"></path></svg>
                            </div>
                            <div class="text-left">
                                <p class="text-[8px] font-black text-indigo-400 uppercase tracking-widest">Full Story</p>
                                <p class="font-bold text-white text-sm">Listen Now</p>
                            </div>
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Global Navigation -->
        <footer class="py-10 flex items-center justify-between gap-6 reveal" style="animation-delay: 0.4s">
            <button id="prev-btn" onclick="changeChapter(-1)" class="nav-btn flex-1 md:flex-none px-8 py-4 rounded-2xl font-bold flex items-center justify-center gap-3">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                Previous
            </button>
            <button id="next-btn" onclick="changeChapter(1)" class="nav-btn flex-1 md:flex-none px-12 py-4 rounded-2xl font-black bg-indigo-600 border-none flex items-center justify-center gap-3 shadow-2xl shadow-indigo-500/30 text-white">
                Next
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </footer>
    </div>

    <!-- Translation Modal -->
    <div id="modal" class="fixed inset-0 hidden items-center justify-center p-6">
        <div class="glass-panel rounded-[3.5rem] p-10 max-w-sm w-full text-center shadow-2xl relative border-t-8 border-indigo-500">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-slate-500 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <h3 id="m-word" class="text-4xl font-black text-white mb-2">Word</h3>
            <p class="text-indigo-400 font-bold mb-8 uppercase tracking-widest text-[10px]">Translation</p>
            <div class="bg-white/5 rounded-3xl p-8 mb-10">
                <p id="m-thai" class="text-3xl font-bold text-slate-100 Sarabun">คำแปล</p>
            </div>
            <button onclick="speakCurrent()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black hover:bg-indigo-500 transition-all flex items-center justify-center gap-3">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"></path></svg>
                REPLAY AUDIO
            </button>
        </div>
    </div>

    <script>
        let currentStory = null;
        let currentIdx = 0;
        const selectedLevel = localStorage.getItem('selectedLevel') || 'A1';
        const storyId = localStorage.getItem('selectedStoryId');
        const levelColors = { 'A1': '#818cf8', 'A2': '#60a5fa', 'B1': '#34d399', 'B2': '#fbbf24', 'C1': '#f97316', 'C2': '#e11d48' };
        document.documentElement.style.setProperty('--level-color', levelColors[selectedLevel] || '#6366f1');

        const script = document.createElement('script');
        script.src = `data_${selectedLevel.toLowerCase()}.js`;
        script.onload = () => {
            currentStory = window.CURRENT_LEVEL_DATA.find(s => s.id === storyId);
            if(currentStory) renderChapter();
        };
        document.body.appendChild(script);

        function renderChapter() {
            const ch = currentStory.chapters[currentIdx];
            document.getElementById('ch-title').innerText = ch.title;
            document.getElementById('chapter-counter').innerText = `Chapter ${currentIdx + 1} / ${currentStory.chapters.length}`;
            
            // Vocab with Audio and Translation
            const vSec = document.getElementById('vocab-section');
            if (currentIdx === 0 && currentStory.vocabulary?.length > 0) {
                vSec.innerHTML = currentStory.vocabulary.map(v => `
                    <div onclick="speak('${v.word}')" class="glass-panel px-5 py-4 rounded-3xl flex items-center justify-between gap-4 border-l-4 border-indigo-500 cursor-pointer hover:bg-white/5 transition-all active:scale-95 group">
                        <div class="min-w-0 flex-1">
                            <p class="text-[8px] font-black text-indigo-400 tracking-widest uppercase mb-0.5">Key Word</p>
                            <p class="text-base font-bold text-white truncate">${v.word}</p>
                            <p class="text-slate-400 text-[11px] font-medium Sarabun truncate">${v.translation}</p>
                        </div>
                        <div class="text-indigo-400 opacity-60 group-hover:opacity-100 transition-opacity">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"></path></svg>
                        </div>
                    </div>
                `).join('');
                vSec.classList.remove('hidden');
            } else vSec.classList.add('hidden');

            // Image and Auto Layout
            const vis = document.getElementById('visual-engine');
            const mainLayout = document.getElementById('main-layout');
            const img = new Image();
            img.src = ch.image;
            img.className = "w-full h-full object-contain transition-opacity duration-1000";
            img.onload = function() {
                // ตรวจสอบทิศทางภาพ
                if (this.naturalWidth < this.naturalHeight) {
                    mainLayout.classList.add('md:flex-row');
                    mainLayout.classList.remove('md:flex-col');
                } else {
                    mainLayout.classList.add('md:flex-col');
                    mainLayout.classList.remove('md:flex-row');
                }
            };
            img.onerror = function() {
                if (this.src.endsWith('.png')) this.src = this.src.replace('.png', '.jpg');
                else vis.innerHTML = `<div class="text-slate-700">Image Missing</div>`;
            };
            vis.innerHTML = ''; vis.appendChild(img);

            // Progress Dots
            const dotC = document.getElementById('progress-container');
            dotC.innerHTML = '';
            currentStory.chapters.forEach((_, i) => {
                const d = document.createElement('div');
                d.className = `progress-dot ${i === currentIdx ? 'active' : ''}`;
                dotC.appendChild(d);
            });

            // Content Split
            const area = document.getElementById('content-area');
            area.innerHTML = '';
            ch.content.split(' ').forEach(w => {
                const clean = w.replace(/[.,!?;:\"()]/g, '').toLowerCase();
                const span = document.createElement('span');
                span.className = 'word-link';
                span.innerText = w + ' ';
                span.onclick = () => {
                    const dict = currentStory.full_dictionary || {};
                    document.getElementById('m-word').innerText = w.replace(/[.,!?;:\"()]/g, '');
                    document.getElementById('m-thai').innerText = dict[clean] || "ไม่พบคำแปล";
                    document.getElementById('modal').classList.replace('hidden', 'flex');
                    speak(w.replace(/[.,!?;:\"()]/g, '')); // เล่นเสียงทันทีที่กด
                };
                area.appendChild(span);
            });

            document.getElementById('prev-btn').disabled = currentIdx === 0;
            document.getElementById('next-btn').innerText = currentIdx === currentStory.chapters.length - 1 ? 'Finish' : 'Next Chapter';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function changeChapter(step) {
            currentIdx += step;
            if (currentIdx >= currentStory.chapters.length) window.location.href = 'library.html';
            else if (currentIdx >= 0) renderChapter();
        }

        function closeModal() { document.getElementById('modal').classList.replace('flex', 'hidden'); }
        function speak(t, r=1) { 
            const m = new SpeechSynthesisUtterance(t); 
            m.lang='en-US'; m.rate=r; 
            window.speechSynthesis.cancel(); window.speechSynthesis.speak(m); 
        }
        function speakFullContent() { speak(currentStory.chapters[currentIdx].content, 0.85); }
        function speakCurrent() { speak(document.getElementById('m-word').innerText); }
        document.getElementById('modal').onclick = (e) => { if(e.target.id === 'modal') closeModal(); };
    </script>
</body>
</html>
