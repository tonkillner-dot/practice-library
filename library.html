<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library - Practice Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030712;
            --level-color: #6366f1;
        }
        body { 
            font-family: 'Outfit', 'Sarabun', sans-serif; 
            background-color: var(--bg-color); 
            color: #f8fafc;
            overflow-x: hidden;
            margin: 0;
        }

        /* --- Dynamic Background --- */
        #glow-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -3;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
        }
        #mouse-glow {
            position: fixed;
            width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: -2;
            transition: top 0.2s ease-out, left 0.2s ease-out;
        }

        /* --- Glass Card Style --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .story-card:hover .glass-card {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--level-color);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
            transform: translateY(-10px);
        }
        .story-card:hover img {
            transform: scale(1.1);
        }

        .level-badge {
            background: var(--level-color);
            box-shadow: 0 0 20px var(--level-color);
        }

        .reveal {
            opacity: 0;
            transform: translateY(20px);
            animation: revealUp 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }
        @keyframes revealUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Back Button --- */
        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-blur: 10px;
        }
        .back-btn:hover {
            background: white;
            color: black;
        }
    </style>
</head>
<body>
    <div id="glow-bg"></div>
    <div id="mouse-glow"></div>

    <div class="max-w-7xl mx-auto px-6 py-12 relative z-10">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-8 mb-20 reveal">
            <div>
                <button onclick="window.location.href='index.html'" class="back-btn px-6 py-2 rounded-full text-xs font-bold tracking-widest flex items-center gap-2 mb-6 transition-all uppercase">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    Back to Levels
                </button>
                <h1 id="level-title" class="text-5xl md:text-7xl font-black tracking-tighter">Library</h1>
                <p id="level-desc" class="text-slate-400 mt-4 font-light text-lg">Explore our curated stories for your level.</p>
            </div>
            <div id="level-indicator" class="level-badge w-24 h-24 md:w-32 md:h-32 rounded-3xl flex items-center justify-center text-5xl md:text-6xl font-black text-white rotate-3">
                ??
            </div>
        </header>

        <!-- Grid Area -->
        <div id="story-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <!-- Loading state -->
            <div class="col-span-full py-20 text-center opacity-50 italic">Loading your stories...</div>
        </div>

        <!-- Footer Footer -->
        <footer class="mt-40 pb-12 text-center opacity-30 text-[10px] font-black tracking-[0.5em] uppercase">
            Practice Library &bull; Immersive Experience &copy; 2024
        </footer>
    </div>

    <script>
        const selectedLevel = localStorage.getItem('selectedLevel') || 'A1';
        
        // Define colors for each level
        const levelConfig = {
            'A1': { color: '#818cf8', name: 'Beginner' },
            'A2': { color: '#60a5fa', name: 'Elementary' },
            'B1': { color: '#34d399', name: 'Intermediate' },
            'B2': { color: '#fbbf24', name: 'Upper-Int' },
            'C1': { color: '#f97316', name: 'Advanced' },
            'C2': { color: '#e11d48', name: 'Mastery' }
        };

        const config = levelConfig[selectedLevel] || levelConfig['A1'];
        document.documentElement.style.setProperty('--level-color', config.color);
        document.getElementById('level-indicator').innerText = selectedLevel;
        document.getElementById('level-title').innerText = `Level ${selectedLevel}`;
        document.getElementById('level-desc').innerText = `${config.name} stories to sharpen your skills.`;

        // Mouse Glow
        const glow = document.getElementById('mouse-glow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        // Load Data
        const script = document.createElement('script');
        script.src = `data_${selectedLevel.toLowerCase()}.js`;
        script.onload = () => {
            const grid = document.getElementById('story-grid');
            grid.innerHTML = '';
            
            if (!window.CURRENT_LEVEL_DATA || window.CURRENT_LEVEL_DATA.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-40 text-center glass-card rounded-[3rem] text-slate-500 italic">No stories available in this level yet.</div>`;
                return;
            }

            window.CURRENT_LEVEL_DATA.forEach((story, idx) => {
                const card = document.createElement('div');
                card.className = 'story-card reveal';
                card.style.animationDelay = `${idx * 0.1}s`;
                
                card.innerHTML = `
                    <div onclick="selectStory('${story.id}')" class="glass-card rounded-[2.5rem] p-4 cursor-pointer h-full flex flex-col">
                        <div class="relative rounded-[2rem] overflow-hidden aspect-[4/5] mb-6 shadow-2xl shadow-black/50">
                            <img src="${story.cover}" class="w-full h-full object-cover transition-transform duration-700" 
                                 onerror="if(this.src.endsWith('.png')){this.src=this.src.replace('.png','.jpg')}">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-60"></div>
                        </div>
                        <div class="px-4 pb-4 flex-1 flex flex-col">
                            <h3 class="text-2xl font-bold text-white mb-3 tracking-tight leading-tight">${story.title}</h3>
                            <p class="text-slate-400 text-sm font-light mb-6 line-clamp-2">${story.description}</p>
                            <div class="mt-auto flex items-center justify-between pt-4 border-t border-white/10">
                                <span class="text-[10px] font-black uppercase tracking-widest text-indigo-400">${story.chapters.length} Chapters</span>
                                <div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center group-hover:bg-white group-hover:text-black transition-colors">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2.5"></path></svg>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        };
        document.body.appendChild(script);

        function selectStory(id) {
            localStorage.setItem('selectedStoryId', id);
            window.location.href = 'reader.html';
        }
    </script>
</body>
</html>
